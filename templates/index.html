<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sullana Social | Gamer Edition</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Roboto:wght@400;500&display=swap');

        :root { 
            --bg-dark: #0b0c10; 
            --card-dark: #1f2833; 
            --neon-accent: #00f3ff; /* Cyan neón */
            --neon-secondary: #c5ea86; /* Verde tipo Matrix */
            --text-light: #c5c6c7;
            --white: #ffffff;
            --danger: #ff4a4a;
        }
        
        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: var(--bg-dark); 
            background-image: radial-gradient(circle at 50% 0%, #1f2833 0%, transparent 70%);
            color: var(--text-light); 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
        }
        
        .layout { 
            display: grid; 
            grid-template-columns: 300px 1fr; 
            gap: 25px; 
            width: 95%; 
            max-width: 1100px; 
            padding-top: 30px; 
        }

        /* BARRA LATERAL (PERFIL GAMER) */
        .sidebar { 
            background: var(--card-dark); 
            border-radius: 12px; 
            padding: 25px; 
            height: fit-content; 
            position: sticky; 
            top: 30px; 
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.1);
        }
        
        .avatar-img { 
            width: 90px; 
            height: 90px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 3px solid var(--neon-accent);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.4);
        }
        
        .profile-info h3 { 
            font-family: 'Rajdhani', sans-serif;
            font-size: 24px;
            margin: 15px 0 5px; 
            color: var(--white); 
            text-shadow: 0 0 5px var(--neon-accent);
        }
        
        .bio-text { font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
        
        /* FORMULARIOS Y CAJAS DE TEXTO */
        .edit-form input, .edit-form textarea, .post-box textarea, .comment-box input { 
            width: 100%; 
            background: #0b0c10;
            color: var(--white);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 10px; 
            font-family: 'Roboto', sans-serif;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        
        .edit-form input:focus, .edit-form textarea:focus, .post-box textarea:focus, .comment-box input:focus {
            border-color: var(--neon-accent);
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
        }

        /* BOTONES GAMER */
        button { 
            cursor: pointer; 
            background: transparent; 
            color: var(--neon-accent); 
            border: 1px solid var(--neon-accent); 
            border-radius: 6px; 
            padding: 10px 15px; 
            font-weight: bold; 
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
            width: 100%;
        }
        
        button:hover { 
            background: var(--neon-accent);
            color: #000;
            box-shadow: 0 0 15px var(--neon-accent);
            transform: translateY(-2px);
        }

        /* MURO DE POSTS */
        .feed { display: flex; flex-direction: column; gap: 20px; }
        
        .post-box { 
            background: var(--card-dark); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid #333; 
        }
        
        .post { 
            background: var(--card-dark); 
            border: 1px solid #333; 
            border-radius: 12px; 
            display: flex; 
            overflow: hidden;
            transition: 0.3s;
            animation: slideIn 0.4s ease-out;
            margin-bottom: 10px;
        }
        
        .post:hover {
            border-color: #555;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .votes { 
            background: rgba(0,0,0,0.2); 
            width: 50px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 15px 0; 
            font-weight: bold;
            color: var(--neon-accent);
        }
        
        .content { padding: 15px 20px; flex-grow: 1; position: relative; }
        
        .content small { color: #888; font-size: 12px; }
        .content b { color: var(--white); font-family: 'Rajdhani', sans-serif; font-size: 18px;}
        .content p { margin-top: 10px; line-height: 1.5; font-size: 15px;}
        
        .post-avatar {
            width: 30px; height: 30px; border-radius: 50%; vertical-align: middle; margin-right: 8px; border: 1px solid var(--neon-accent);
        }

        /* MULTIMEDIA */
        .media-content {
            margin-top: 15px;
            max-width: 100%;
            border-radius: 8px;
            border: 1px solid #333;
            display: block;
        }

        /* COMENTARIOS */
        .comment-section {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-top: 1px solid #333;
        }
        .comment {
            font-size: 13px;
            padding: 5px 0;
            border-bottom: 1px solid #222;
        }
        .comment b { color: var(--neon-accent); font-size: 13px; }

        .btn-delete {
            position: absolute;
            right: 15px;
            top: 15px;
            color: var(--danger);
            border: 1px solid var(--danger);
            width: auto;
            padding: 2px 8px;
            font-size: 12px;
        }
        .btn-delete:hover {
            background: var(--danger);
            box-shadow: 0 0 10px var(--danger);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-accent); }

        @media (max-width: 768px) { .layout { grid-template-columns: 1fr; } .sidebar { position: static; } }
    </style>
</head>
<body>

    <div class="layout">
        <aside class="sidebar">
            <div style="text-align: center;">
                <img src="{{ avatar }}" class="avatar-img" alt="Foto">
                <div class="profile-info">
                    <h3>[ {{ usuario }} ]</h3>
                    <p class="bio-text">{{ bio }}</p>
                </div>
            </div>
            
            <a href="/perfil/{{ usuario }}" style="text-decoration: none;">
                <button style="margin-bottom: 10px; background: rgba(0,243,255,0.1);">Ver mi Perfil</button>
            </a>

            <hr style="border-color: #333; margin: 20px 0;">
            
            <form action="/editar_perfil" method="POST" class="edit-form">
                <label style="font-size: 11px; color: var(--neon-accent);">URL FOTO PERFIL</label>
                <input type="text" name="foto_url" placeholder="URL de tu foto" value="{{ avatar }}">
                <label style="font-size: 11px; color: var(--neon-accent);">BIO</label>
                <textarea name="bio" placeholder="Tu biografía..." rows="3">{{ bio }}</textarea>
                <button type="submit" style="font-size: 14px; padding: 8px;">Actualizar Stats</button>
            </form>
            <br>
            <a href="/login" style="font-size: 12px; color: #ff4a4a; text-decoration: none; display: block; text-align: center; margin-top: 10px; font-weight: bold; letter-spacing: 1px;">&lt; DESCONECTAR &gt;</a>
        </aside>

        <main class="feed">
            <div class="post-box">
                <textarea id="msg" placeholder="¿Qué hay de nuevo, {{ usuario }}? Escribe algo épico..." style="height: 80px; resize: none;"></textarea>
                
                <input type="text" id="media_url" placeholder="Pega link de Imagen o Video (.mp4 / .jpg / .gif)" style="background: #0b0c10; color: white; border: 1px solid #444; width: 100%; padding: 8px; border-radius: 5px; margin-bottom: 10px;">
                
                <label style="color: var(--neon-accent); cursor: pointer; border: 1px solid var(--neon-accent); padding: 10px; display: block; text-align: center; border-radius: 5px; margin-bottom: 10px; font-family: 'Rajdhani', sans-serif; font-weight: bold; font-size: 14px; text-transform: uppercase;">
                    📁 O Selecciona Archivo de tu PC
                    <input type="file" id="archivo_pc" style="display: none;">
                </label>
                <span id="file-name" style="font-size: 12px; color: #888; display: block; margin-bottom: 10px; text-align: center;"></span>
                
                <button onclick="publicar()">&gt; Lanzar Publicación</button>
            </div>

            <div id="muro">
                {% for p in posts %}
                <div class="post-container" id="container-{{ p.id }}">
                    <div class="post">
                        <div class="votes">▲<br>0<br>▼</div>
                        <div class="content">
                            {% if p.usuario == usuario %}
                            <button class="btn-delete" onclick="eliminarPost('{{ p.id }}')">BORRAR</button>
                            {% endif %}

                            <small>
                                <img src="{{ p.avatar }}" class="post-avatar">
                                <b>{{ p.usuario }}</b> // {{ p.hora }}
                            </small>
                            <p>{{ p.contenido }}</p>

                            {% if p.media_url %}
                                {% if p.media_url.endswith('.mp4') %}
                                <video src="{{ p.media_url }}" class="media-content" controls></video>
                                {% else %}
                                <img src="{{ p.media_url }}" class="media-content">
                                {% endif %}
                            {% endif %}
                        </div>
                    </div>
                    
                    <div class="comment-section">
                        <div id="comments-{{ p.id }}">
                            </div>
                        <div class="comment-box" style="display: flex; gap: 5px; margin-top: 10px;">
                            <input type="text" id="input-{{ p.id }}" placeholder="Escribe un comentario..." style="margin-bottom: 0;">
                            <button onclick="comentar('{{ p.id }}')" style="width: auto; padding: 5px 15px;">OK</button>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </main>
    </div>

    <script>
        var socket = io();
        var mi_usuario = "{{ usuario }}";

        // NUEVO: Mostrar el nombre del archivo seleccionado al usuario
        document.getElementById('archivo_pc').addEventListener('change', function(){
            document.getElementById('file-name').innerText = this.files[0] ? `Archivo cargado: ${this.files[0].name}` : '';
        });

        // NUEVO: Modificada para enviar archivo o link
        function publicar() {
            var m = document.getElementById('msg').value;
            var media = document.getElementById('media_url').value;
            var fileInput = document.getElementById('archivo_pc');
            
            // Si el usuario eligió un archivo desde su PC
            if (fileInput.files.length > 0) {
                var formData = new FormData();
                formData.append('file', fileInput.files[0]);

                // Lo enviamos a la ruta Python para guardarlo
                fetch('/upload', {
                    method: 'POST',
                    body: formData
                })
                .then(response => {
                    if(!response.ok) throw new Error('Error al subir el archivo');
                    return response.text();
                })
                .then(url_archivo => {
                    // Una vez que Python nos devuelve la ruta del archivo, enviamos el post por Socket
                    socket.emit('enviar_post', {contenido: m, media_url: url_archivo});
                    limpiarCampos();
                })
                .catch(err => alert(err.message));
            } 
            // Si no hay archivo pero hay texto o un link pegado
            else if (m.trim() !== '' || media.trim() !== '') {
                socket.emit('enviar_post', {contenido: m, media_url: media});
                limpiarCampos();
            }
        }

        function limpiarCampos() {
            document.getElementById('msg').value = '';
            document.getElementById('media_url').value = '';
            document.getElementById('archivo_pc').value = '';
            document.getElementById('file-name').innerText = '';
        }

        function eliminarPost(id) {
            if(confirm("¿Seguro que quieres borrar este post?")) {
                socket.emit('borrar_post', id);
            }
        }

        function comentar(postId) {
            var input = document.getElementById('input-' + postId);
            if(input.value.trim() !== '') {
                socket.emit('enviar_comentario', {post_id: postId, texto: input.value});
                input.value = '';
            }
        }

        socket.on('publicacion_instantanea', function(data) {
            var muro = document.getElementById('muro');
            var mediaHtml = '';
            if(data.media_url) {
                if(data.media_url.includes('.mp4')) {
                    mediaHtml = `<video src="${data.media_url}" class="media-content" controls></video>`;
                } else {
                    mediaHtml = `<img src="${data.media_url}" class="media-content">`;
                }
            }

            var deleteBtn = (data.usuario === mi_usuario) ? `<button class="btn-delete" onclick="eliminarPost('${data.id}')">BORRAR</button>` : '';

            var nuevoHtml = `
                <div class="post-container" id="container-${data.id}">
                    <div class="post">
                        <div class="votes">▲<br>0<br>▼</div>
                        <div class="content">
                            ${deleteBtn}
                            <small>
                                <img src="${data.avatar}" class="post-avatar">
                                <b>${data.usuario}</b> // ${data.hora}
                            </small>
                            <p>${data.contenido}</p>
                            ${mediaHtml}
                        </div>
                    </div>
                    <div class="comment-section">
                        <div id="comments-${data.id}"></div>
                        <div class="comment-box" style="display: flex; gap: 5px; margin-top: 10px;">
                            <input type="text" id="input-${data.id}" placeholder="Escribe un comentario..." style="margin-bottom: 0;">
                            <button onclick="comentar('${data.id}')" style="width: auto; padding: 5px 15px;">OK</button>
                        </div>
                    </div>
                </div>`;
            muro.insertAdjacentHTML('afterbegin', nuevoHtml);
        });

        socket.on('post_eliminado', function(id) {
            var el = document.getElementById('container-' + id);
            if(el) el.remove();
        });

        socket.on('nuevo_comentario', function(data) {
            var box = document.getElementById('comments-' + data.post_id);
            if(box) {
                box.innerHTML += `<div class="comment"><b>${data.usuario}:</b> ${data.texto}</div>`;
            }
        });
    </script>
</body>
</html>
