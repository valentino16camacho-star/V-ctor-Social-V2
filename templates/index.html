<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sullana Reddit</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        :root { --reddit-blue: #0079D3; --bg: #DAE0E6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; }
        
        .layout { display: grid; grid-template-columns: 300px 1fr; gap: 20px; width: 95%; max-width: 1100px; padding-top: 20px; }

        /* BARRA LATERAL (PERFIL) */
        .sidebar { background: white; border-radius: 5px; padding: 20px; height: fit-content; position: sticky; top: 20px; border: 1px solid #ccc; }
        .avatar-img { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; background: #eee; }
        .profile-info h3 { margin: 10px 0 5px; color: var(--reddit-blue); }
        .bio-text { font-size: 14px; color: #555; margin-bottom: 15px; }
        .edit-form input, .edit-form textarea { width: 100%; margin-bottom: 5px; font-size: 12px; }

        /* MURO DE POSTS */
        .feed { display: flex; flex-direction: column; gap: 15px; }
        .post-box { background: white; padding: 15px; border-radius: 5px; border: 1px solid #ccc; }
        .post { background: white; border: 1px solid #ccc; border-radius: 5px; display: flex; }
        .votes { background: #f8f9fa; width: 40px; display: flex; flex-direction: column; align-items: center; padding: 10px 0; border-right: 1px solid #eee; }
        .content { padding: 10px 15px; flex-grow: 1; }
        
        button { cursor: pointer; background: var(--reddit-blue); color: white; border: none; border-radius: 20px; padding: 8px 15px; font-weight: bold; }
        
        @media (max-width: 768px) { .layout { grid-template-columns: 1fr; } .sidebar { position: static; } }
    </style>
</head>
<body>

    <div class="layout">
        <aside class="sidebar">
            <div style="text-align: center;">
                <img src="{{ avatar }}" class="avatar-img" alt="Foto">
                <div class="profile-info">
                    <h3>u/{{ usuario }}</h3>
                    <p class="bio-text">{{ bio }}</p>
                </div>
            </div>
            <hr>
            <form action="/editar_perfil" method="POST" class="edit-form">
                <input type="text" name="foto_url" placeholder="URL de tu foto" value="{{ avatar }}">
                <textarea name="bio" placeholder="Tu biografía...">{{ bio }}</textarea>
                <button type="submit" style="background: #222; font-size: 10px;">Guardar Perfil</button>
            </form>
            <br>
            <a href="/login" style="font-size: 12px; color: red;">Cerrar sesión</a>
        </aside>

        <main class="feed">
            <div class="post-box">
                <textarea id="msg" placeholder="¿Qué quieres compartir, u/{{ usuario }}?" style="width: 100%; height: 60px;"></textarea>
                <button onclick="publicar()" style="margin-top: 10px;">Publicar en Sullana</button>
            </div>

            <div id="muro">
                {% for p in posts %}
                <div class="post">
                    <div class="votes">⬆️<br>0<br>⬇️</div>
                    <div class="content">
                        <small>Publicado por <b>u/{{ p.usuario }}</b> a las {{ p.hora }}</small>
                        <p>{{ p.contenido }}</p>
                    </div>
                </div>
                {% endfor %}
            </div>
        </main>
    </div>

    <script>
        var socket = io();
        function publicar() {
            var m = document.getElementById('msg').value;
            if(m) {
                socket.emit('enviar_post', {contenido: m});
                document.getElementById('msg').value = '';
            }
        }

        socket.on('publicacion_instantanea', function(data) {
            var muro = document.getElementById('muro');
            var nuevoHtml = `
                <div class="post">
                    <div class="votes">⬆️<br>0<br>⬇️</div>
                    <div class="content">
                        <small>Publicado por <b>u/${data.usuario}</b> a las ${data.hora}</small>
                        <p>${data.contenido}</p>
                    </div>
                </div>`;
            muro.insertAdjacentHTML('afterbegin', nuevoHtml);
        });
    </script>
</body>
</html>
